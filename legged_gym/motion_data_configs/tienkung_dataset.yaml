# Tienkung motion dataset configuration
# Set root_path to the directory containing your retargeted tienkung pkl files
# These pkl files are generated by GMR's smplx_to_robot_dataset.py with --robot tienkung

root_path: /path/to/your/tienkung_motion_data
motions:
# Add your retargeted tienkung pkl files here
# Each entry should be:
#   - file: <relative_path_to_pkl_from_root_path>
#     weight: 1.0
#     description: <motion_description>
#
# Example entries (replace with your actual files):
# - file: AMASS_tienkung_GMR/walking_001.pkl
#   weight: 1.0
#   description: walking motion
# - file: AMASS_tienkung_GMR/standing_001.pkl
#   weight: 1.0
#   description: standing motion
# - file: OMOMO_tienkung_GMR/sub1_clothesstand_000.pkl
#   weight: 1.0
#   description: general movement
